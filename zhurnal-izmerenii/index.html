  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

loseComment }}\" style=\"cursor:pointer; color:#8a8a8a; font-size:18px;\">×<\u002Fspan><\u002Fdiv><textarea value=\"{{ modalText }}\" onchange=\"{{ onCommentInput }}\" placeholder=\"{{ t.add }}\" autofocus=\"\" style=\"width:100%; min-height:66px; resize:none; background:#3a3a3a; border:0; border-bottom:2px solid #97ca30; border-radius:2px; padding:10px; color:#e8e8e8; font-family:inherit; font-size:14px; outline:none;\"><\u002Ftextarea><div style=\"display:flex; gap:9px; margin:12px 0 14px; justify-content:flex-end;\"><button onclick=\"{{ closeComment }}\" style=\"cursor:pointer; border:0; background:#4a4a4a; color:#cfcfcf; padding:10px 18px; border-radius:4px; font-family:inherit; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.5px;\">{{ t.cancel }}<\u002Fbutton><button onclick=\"{{ saveComment }}\" style=\"cursor:pointer; border:0; background:#4a4a4a; color:#97ca30; padding:10px 18px; border-radius:4px; font-family:inherit; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;\">{{ t.save }}<\u002Fbutton><\u002Fdiv><div style=\"background:#1e1e1e; border-radius:6px; padding:7px 5px; display:flex; flex-direction:column; gap:6px;\"><sc-for list=\"{{ kbRows }}\" as=\"row\" hint-placeholder-count=\"3\"><div style=\"display:flex; justify-content:center; gap:4px;\"><sc-for list=\"{{ row }}\" as=\"k\" hint-placeholder-count=\"10\"><span style=\"min-width:26px; text-align:center; background:#3d3d40; border-radius:4px; padding:8px 0; font-size:13px; color:#e8e8e8;\">{{ k }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fsc-for><div style=\"display:flex; justify-content:center; gap:4px;\"><span style=\"flex:1; max-width:180px; background:#3d3d40; border-radius:4px; padding:8px 0; text-align:center; font-size:12px; color:#9a9a9a;\">space<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:7px; font-size:12px; color:#8a8a8a; align-items:center;\"><span style=\"color:#6f6f6f;\">Состояние:<\u002Fspan> Редактирование комментария<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1420,&quot;height&quot;:940},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;ru&quot;,&quot;en&quot;],&quot;default&quot;:&quot;ru&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Общее&quot;},&quot;thresholds&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Общее&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const base = [\n      {id:1, y:2026,mo:7,d:9,hh:'14',mm:'31',ss:'12', dose:0.1149, cps:21.4, err:5.0, lat:55.75123, lon:37.61841, comment:'Фон в квартире | Background at home', warn:false},\n      {id:2, y:2026,mo:7,d:9,hh:'14',mm:'22',ss:'47', dose:0.1702, cps:24.1, err:4.2, lat:55.75210, lon:37.61790, comment:'', warn:true},\n      {id:3, y:2026,mo:7,d:9,hh:'14',mm:'10',ss:'05', dose:0.0987, cps:19.8, err:6.1, lat:55.75008, lon:37.61902, comment:'У подъезда | By the entrance', warn:false},\n      {id:4, y:2026,mo:7,d:9,hh:'13',mm:'58',ss:'33', dose:0.3120, cps:41.0, err:3.8, lat:55.74980, lon:37.62110, comment:'Гранитная плитка | Granite tiles', warn:true},\n      {id:5, y:2026,mo:7,d:9,hh:'13',mm:'40',ss:'19', dose:0.1210, cps:22.0, err:5.0, lat:55.75150, lon:37.61650, comment:'', warn:false},\n      {id:6, y:2026,mo:7,d:9,hh:'13',mm:'12',ss:'52', dose:0.1085, cps:20.6, err:5.4, lat:55.75300, lon:37.61550, comment:'Парковка | Parking lot', warn:false},\n      {id:7, y:2026,mo:8,d:8,hh:'19',mm:'20',ss:'11', dose:0.1602, cps:23.9, err:4.5, lat:55.75410, lon:37.61480, comment:'Вечерний фон | Evening background', warn:false}\n    ];\n    this.state = {\n      lang: (props.lang==='en'?'en':'ru'),\n      data: base,\n      exp: {},\n      filter: {a:false, b:true, c:false},\n      modal: {opt:'c', id:5, text:''}\n    };\n  }\n  L(){\n    const RU = {\n      title:'Журнал измерений', filters:'Фильтры', unit:'мкЗв/ч',\n      count:(n)=>n+' '+(n%10===1&&n%100!==11?'запись':(n%10>=2&&n%10<=4&&(n%100<10||n%100>=20)?'записи':'записей')),\n      cTime:'Дата-время', cDose:'Мощность дозы', cCps:'cps', cErr:'Погрешность', cErrShort:'погр.', cCoord:'Координаты', cComment:'Комментарий',\n      fPeriod:'Период', fDose:'Мощность дозы', fCps:'cps', apply:'Применить', reset:'Сбросить',\n      add:'Добавить комментарий…', editC:'Комментарий', save:'Сохранить', cancel:'Отмена',\n      del:'Удалить', map:'На карте', share:'Экспорт',\n      nav:['Дисплей','Архив','Карта','Настройки','Выход'],\n      from:'с', to:'по',\n      months:['','января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'],\n      kb:[['й','ц','у','к','е','н','г','ш','щ','з','х'],['ф','ы','в','а','п','р','о','л','д','ж','э'],['я','ч','с','м','и','т','ь','б','ю']]\n    };\n    const EN = {\n      title:'Measurement journal', filters:'Filters', unit:'µSv/h',\n      count:(n)=>n+(n===1?' record':' records'),\n      cTime:'Date & time', cDose:'Dose rate', cCps:'cps', cErr:'Error', cErrShort:'err', cCoord:'Coordinates', cComment:'Comment',\n      fPeriod:'Period', fDose:'Dose rate', fCps:'cps', apply:'Apply', reset:'Reset',\n      add:'Add a comment…', editC:'Comment', save:'Save', cancel:'Cancel',\n      del:'Delete', map:'On map', share:'Export',\n      nav:['Display','History','Map','Settings','Exit'],\n      from:'from', to:'to',\n      months:['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],\n      kb:[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['z','x','c','v','b','n','m']]\n    };\n    return this.state.lang==='en'?EN:RU;\n  }\n  setLang(l){ this.setState({lang:l}); }\n  toggleExp(opt,id){ const k=opt+':'+id; this.setState(s=>({exp:{...s.exp,[k]:!s.exp[k]}})); }\n  setFilter(opt,v){ this.setState(s=>({filter:{...s.filter,[opt]:v}})); }\n  openComment(opt,id){ const m=this.state.data.find(x=>x.id===id); this.setState({modal:{opt,id,text:m?m.comment:''}}); }\n  closeComment(){ this.setState({modal:null}); }\n  onCommentInput(e){ const v=e.target.value; this.setState(s=>({modal:{...s.modal,text:v}})); }\n  saveComment(){ const {id,text}=this.state.modal; this.setState(s=>({data:s.data.map(m=>m.id===id?{...m,comment:text}:m), modal:null})); }\n  del(id){ this.setState(s=>({data:s.data.filter(m=>m.id!==id)})); }\n  fmt(m,L,opt){\n    const dd=String(m.d).padStart(2,'0'), mo2=String(m.mo).padStart(2,'0');\n    const timeStr=m.hh+':'+m.mm+':'+m.ss;\n    const dateNum=this.state.lang==='en'? (L.months[m.mo]+' '+m.d) : (dd+'.'+mo2+'.'+m.y);\n    const groupLabel=this.state.lang==='en'? (L.months[m.mo]+' '+m.d+', '+m.y) : (m.d+' '+L.months[m.mo]+' '+m.y);\n    const hasC=!!(m.comment&&m.comment.trim());\n    const thresholds=this.props.thresholds!==false;\n    const warnEff=m.warn&&thresholds;\n    return {\n      id:m.id, warn:warnEff, barColor:warnEff?'#ffec5b':'#97ca30',\n      doseStr:m.dose.toFixed(4), cpsStr:m.cps.toFixed(1), errStr:m.err.toFixed(1)+'%',\n      coordStr:m.lat.toFixed(5)+', '+m.lon.toFixed(5),\n      timeStr, dateNum, dateKey:dd+'.'+mo2+'.'+m.y, groupLabel,\n      commentStr:hasC?m.comment:'', placeholder:L.add, hasC, noC:!hasC,\n      expanded:!!this.state.exp[opt+':'+m.id], collapsed:!this.state.exp[opt+':'+m.id],\n      onToggle:()=>this.toggleExp(opt,m.id),\n      onComment:(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); this.openComment(opt,m.id); },\n      onDelete:(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); this.del(m.id); },\n      onMap:(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); },\n      onShare:(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); }\n    };\n  }\n  renderVals(){\n    const L=this.L();\n    const listA=this.state.data.map(m=>this.fmt(m,L,'a'));\n    const listB=this.state.data.map(m=>this.fmt(m,L,'b'));\n    const listC=this.state.data.map(m=>this.fmt(m,L,'c'));\n    const gmap={}, order=[];\n    listC.forEach(m=>{ if(!gmap[m.dateKey]){gmap[m.dateKey]={label:m.groupLabel,items:[]};order.push(m.dateKey);} gmap[m.dateKey].items.push(m); });\n    const groupsC=order.map(k=>({label:gmap[k].label,count:L.count(gmap[k].items.length),items:gmap[k].items}));\n    const n=this.state.data.length;\n    const modal=this.state.modal;\n    const ru=this.state.lang==='ru';\n    return {\n      t:L,\n      ruBg:ru?'#4a4a4a':'transparent', ruColor:ru?'#97ca30':'#9a9a9a',\n      enBg:ru?'transparent':'#4a4a4a', enColor:ru?'#9a9a9a':'#97ca30',\n      setRu:()=>this.setLang('ru'), setEn:()=>this.setLang('en'),\n      title:L.title, filtersLabel:L.filters, countStr:L.count(n),\n      navDisplay:L.nav[0], navArchive:L.nav[1], navMap:L.nav[2], navSettings:L.nav[3], navExit:L.nav[4],\n      listA, listB, listC, groupsC,\n      filterA:this.state.filter.a, filterB:this.state.filter.b, filterC:this.state.filter.c,\n      fColorA:this.state.filter.a?'#97ca30':'#eaeaea', fColorC:this.state.filter.c?'#97ca30':'#eaeaea',\n      toggleFA:()=>this.setFilter('a',!this.state.filter.a),\n      toggleFB:()=>this.setFilter('b',!this.state.filter.b),\n      toggleFC:()=>this.setFilter('c',!this.state.filter.c),\n      showCommentA:!!(modal&&modal.opt==='a'), showCommentB:!!(modal&&modal.opt==='b'), showCommentC:!!(modal&&modal.opt==='c'),\n      modalText:modal?modal.text:'', modalTitle:L.editC,\n      onCommentInput:(e)=>this.onCommentInput(e), saveComment:()=>this.saveComment(), closeComment:()=>this.closeComment(),\n      kbRows:L.kb\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
